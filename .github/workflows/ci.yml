name: Continuous Integration

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:

  llm:
    name: LLM Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Call OpenAI API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_APIKEY }}
        run: |
          curl https://api.openai.com/v1/chat/completions \
            -o response.json \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-4.1-mini",
              "messages": [
                {"role": "system", "content": "You are a helpful assistant."},
                {"role": "user", "content": "给我写一首五言绝句"}
              ]
            }'

      - name: Show response
        run: cat response.json | jq . || cat response.json

  local_llm:
    name: Local LLM Test
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - uses: actions/checkout@v4

      - name: Start local LLM
        id: run_local_llm
        uses: muhac/llm-actions@v2
        with:
          model: Qwen/Qwen3-1.7B

      - name: Show vLLM logs
        env:
          VLLM_LOGS: ${{ steps.run_local_llm.outputs.logs }}
        run: echo "$VLLM_LOGS"

      - name: Test the server
        run: curl --retry 5 --retry-delay 10 http://localhost:8000/v1/models

      - name: Demo inference
        run: |
          curl --fail http://localhost:8000/v1/chat/completions \
            -o response.json \
            -H "Content-Type: application/json" \
            -d '{
              "model": "Qwen/Qwen3-1.7B",
              "messages": [
                {"role": "system", "content": "/no_think"},
                {"role": "user", "content": "给我写一首五言绝句"}
              ]
            }'
          # /no_think disables the reasoning chain on Qwen3 models

      - name: Show response
        run: cat response.json | jq . || cat response.json

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --locked

      - name: Run LLM script with local model (preview)
        env:
          LANGSMITH_TRACING: "true"
          LANGSMITH_ENDPOINT: "https://api.smith.langchain.com"
          LANGSMITH_PROJECT: "chinese-holidays-calendar"
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_APIKEY }}
          OPENAI_BASE_URL: "http://localhost:8000/v1"
          OPENAI_MODEL: "Qwen/Qwen3-1.7B"
        run: uv run python holiday_llm.py

  crawler:
    name: Crawler Dry Run
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --locked

      - name: Run crawler script
        shell: bash
        run: uv run python crawler.py

  parser:
    name: Parser Dry Run
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ghc: [ "9.6", "9.8" ]
        cabal: [ "3.10", "latest" ]
        include:
          - ghc: "9.2.8"
            cabal: "3.10.1.0"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Haskell ${{ matrix.ghc }} with Cabal ${{ matrix.cabal }}
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}

      - name: Configure the build
        run: |
          cabal configure --enable-tests --enable-benchmarks --disable-documentation
          cabal build --dry-run

      - name: Build
        run: cabal build all

      - name: Run tests
        run: cabal test all

      - name: Check cabal file
        run: cabal check

      - name: Run parser
        run: cabal run

      - name: Checkout files
        run: |
          pwd
          ls -la
          ls -la docs

  hlint:
    name: HLint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: "Set up HLint"
        uses: haskell-actions/hlint-setup@v2

      - name: "Run HLint"
        uses: haskell-actions/hlint-run@v2
        with:
          path: parser/
          fail-on: warning

  pylint:
    name: Pylint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies (uv dev)
        run: uv sync --dev --locked

      - name: Analyzing the code with pylint
        run: uv run pylint $(git ls-files '*.py')
